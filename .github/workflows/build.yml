name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./HelloWorld
          push: true
          tags: lostmagick/helloworld:${{ github.sha }}

      - name: Update CD repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Charme3/HelloWorld-cd.git
          cd HelloWorld-cd
          sed -i "s|lostmagick/helloworld:.*|lostmagick/helloworld:${{ github.sha }}|g" deployment.yaml
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Update image to ${{ github.sha }}"
          git push